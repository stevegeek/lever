name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: verify version constant matches tag
        run: |
          V="${GITHUB_REF_NAME#v}"
          grep -q "const Version = \"$V\"" internal/cli/root.go || {
            echo "internal/cli/root.go const Version does not match tag $GITHUB_REF_NAME"; exit 1; }
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
